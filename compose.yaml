services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
    ports:
      - "8084:8084"
    environment:
      GATEWAY_URL: http://gateway-service:8080

  user-service:
    build:
      context: ./user-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  learning-service:
    build:
      context: ./learning-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  trilha-service:
    build:
      context: ./trilha-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  gateway-service:
    build:
      context: ./gateway-service
    ports:
      - "8080:8080"
    environment:
      SERVICES_USER_URL: http://user-service:8081
      SERVICES_LEARNING_URL: http://learning-service:8082
      SERVICES_TRILHA_URL: http://trilha-service:8083
      SERVICES_AUTH_URL: http://auth-service:8084
    depends_on:
      - auth-service
      - user-service
      - learning-service
      - trilha-service

  front:
    build:
      context: ./front
    ports:
      - "3000:80"
    depends_on:
      - gateway-service

volumes:
  db-data:
